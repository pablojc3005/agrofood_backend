spring.application.name=agrofood_backend

# Database
spring.datasource.url=jdbc:mariadb://localhost:3306/agrofood
spring.datasource.username=root
spring.datasource.password=pablo
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.connection.charSet=utf8

# Naming strategy para que respete los nombres de tablas y columnas exactos
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

spring.jackson.serialization.fail-on-empty-beans=false

# Server
server.port=8080